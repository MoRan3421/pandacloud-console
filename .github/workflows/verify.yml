name: Verify PandaCloud

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Worker types
        run: npx tsc --project worker/tsconfig.json

      - name: Build static application
        run: npm run build

      - name: Validate customer release configuration
        run: npx wrangler deploy --env production --dry-run

      - name: Validate internal release configuration
        run: npx wrangler deploy --env development --dry-run
